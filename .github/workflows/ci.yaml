name: Backup Restore CI

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - main
      - release/v[0-9]+.(0|x)
      - release/v[0-9]+.[0-9]+.[0-9]+
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
  pull_request:
    paths-ignore:
    - 'docs/**'
    - '*.md'
    - '.gitignore'
    - 'CODEOWNERS'
    - 'LICENSE'
jobs:
  workspace-sync:
    name: workspace sync check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/go1.26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check go.work.sum is in sync
        run: |
          [ -f go.work ] || { echo "No go.work found, skipping workspace sync check"; exit 0; }
          go work sync
          git diff --exit-code go.work.sum || (echo "go.work.sum is out of sync — run 'make tidy' and commit the result" && exit 1)

  golangci:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/go1.26
    strategy:
      matrix:
        module:
          - .
          - cmd/tool
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check module exists
        id: check
        run: echo "exists=$([ -f '${{ matrix.module }}/go.mod' ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0
        if: steps.check.outputs.exists == 'true'
        with:
          version: v0.2.0
      - name: golangci-lint (${{ matrix.module }})
        if: steps.check.outputs.exists == 'true'
        run: golangci-lint run ./...
        working-directory: ${{ matrix.module }}
  build:
    name: CI Build
    strategy:
      matrix:
        arch:
          - x64
          - arm64
    runs-on: runs-on,image=ubuntu22-full-${{ matrix.arch }},runner=4cpu-linux-${{ matrix.arch }},run-id=${{ github.run_id }}
    container:
      image: ghcr.io/rancher/ci-image/go1.26
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0
        with:
          version: v0.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Install Helm-unittest
        run: |
          ci-select helm helmv4 && \
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false
      - name: Install python
        run: |
          zypper -n install --no-recommends \
              python311 \
              python311-pip \
              && zypper clean -a \
              && ln -sf /usr/bin/python3.11 /var/ci-tools/active/python3
      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0 - DO NOT BUMP
      - name: CI
        run: |
          ci-select helm helmv4 && \
          make ci
  test:
    name: integration-test
    runs-on: runs-on,image=ubuntu22-full-${{ matrix.arch }},runner=4cpu-linux-${{ matrix.arch }},run-id=${{ github.run_id }}
    strategy:
      matrix:
        arch:
          - x64
          - arm64
        K3S_VERSION:
          - v1.34.5-k3s1
          - v1.36.1-k3s1
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26
      - name: Use dep-fetch for ci tooling
        uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0
      - name: Install helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false
      - name: Setup helm charts
        run: ./scripts/package-helm
      - name: Debug
        run: ls -R ./build/artifacts
      - name: Setup test environment
        run: |
          CLUSTER_NAME=backup-restore K3S_VERSION=${{ matrix.K3S_VERSION }} ./scripts/testenv
          k3d kubeconfig get backup-restore > kubeconfig.yaml
      - name: Debug kubeconfig
        run: cat kubeconfig.yaml
      - name: Run e2e tests
        run: |
          cd e2e && KUBECONFIG=$KUBECONFIG CHART_NAMESPACE=cattle-resources-system go test -v -timeout 10m -count=1 ./...
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
