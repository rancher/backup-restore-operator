name: Backup Restore CI

permissions:
  contents: read

on:
  workflow_call:
  push:
    branches:
      - main
      - release/v[0-9]+.(0|x)
      - release/v[0-9]+.[0-9]+.[0-9]+
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
  pull_request:
    paths-ignore:
    - 'docs/**'
    - '*.md'
    - '.gitignore'
    - 'CODEOWNERS'
    - 'LICENSE'
jobs:
  workspace-sync:
    name: workspace sync check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/go1.25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check go.work.sum is in sync
        run: |
          [ -f go.work ] || { echo "No go.work found, skipping workspace sync check"; exit 0; }
          go work sync
          git diff --exit-code go.work.sum || (echo "go.work.sum is out of sync — run 'make tidy' and commit the result" && exit 1)

  golangci:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rancher/ci-image/go1.25
    strategy:
      matrix:
        module:
          - .
          - cmd/tool
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check module exists
        id: check
        run: echo "exists=$([ -f '${{ matrix.module }}/go.mod' ] && echo true || echo false)" >> $GITHUB_OUTPUT
      - uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0
        if: steps.check.outputs.exists == 'true'
        with:
          version: v0.2.0
      - name: golangci-lint (${{ matrix.module }})
        if: steps.check.outputs.exists == 'true'
        run: golangci-lint run ./...
        working-directory: ${{ matrix.module }}
  build:
    name: CI Build
    strategy:
      matrix:
        arch:
          - x64
          - arm64
    runs-on: runs-on,image=ubuntu22-full-${{ matrix.arch }},runner=4cpu-linux-${{ matrix.arch }},run-id=${{ github.run_id }}
    container:
      image: ghcr.io/rancher/ci-image/go1.25
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0
        with:
          version: v0.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Install Helm-unittest
        run: helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
      - name: Set up chart-testing
        uses: helm/chart-testing-action@0d28d3144d3a25ea2cc349d6e59901c4ff469b3b # v2.7.0 - DO NOT BUMP
      - name: CI
        run: make ci
  test:
    name: integration-test
    runs-on: runs-on,image=ubuntu22-full-${{ matrix.arch }},runner=4cpu-linux-${{ matrix.arch }},run-id=${{ github.run_id }}
    container:
      image: ghcr.io/rancher/ci-image/go1.25
    strategy:
      matrix:
        arch:
          - x64
          - arm64
        K3S_VERSION:
          - v1.34.5-k3s1
          - v1.36.1-k3s1
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rancherlabs/dep-fetch/actions/sync-deps@56731ed2727325212f71f7682013dc71c18540e1 # v0.1.1
        with: # Kept to fetch k3d
          version: v0.1.1
      - name: Install Helm-unittest
        run: helm plugin install --verify=false https://github.com/quintush/helm-unittest
      - name: Setup helm charts
        run: ./scripts/package-helm
      - name: Debug
        run: ls -R ./build/artifacts
      - name: Setup test environment
        run: |
          CLUSTER_NAME=backup-restore K3S_VERSION=${{ matrix.K3S_VERSION }} ./scripts/testenv
          k3d kubeconfig get backup-restore > kubeconfig.yaml
      - name: Debug kubeconfig
        run: cat kubeconfig.yaml
      - name: Run e2e tests
        run: |
          cd e2e && KUBECONFIG=$KUBECONFIG CHART_NAMESPACE=cattle-resources-system go test -v -timeout 10m -count=1 ./...
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
