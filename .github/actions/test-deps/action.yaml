name: test-deps
description: Install the tooling needed to run the integration test job

inputs:
  github-token:
    description: Token passed to azure/setup-helm for authenticated downloads
    required: true

runs:
  using: composite
  steps:
    - name: Install go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: 1.26

    - uses: rancherlabs/dep-fetch/actions/sync-deps@35f5facb2f545a6ebbba91f8a635cf2511ade703 # v0.2.0

    - name: Install helm
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        token: ${{ inputs.github-token }}

    - name: Install Helm-unittest
      shell: bash
      run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false
