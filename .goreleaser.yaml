# Make sure to check the documentation at https://goreleaser.com
version: 2 # the goreleaser config version
before:
  hooks:
    - ./scripts/tidy
builds:
    - id: backup-restore-operator
      main: ./cmd/operator/main.go
      goos:
        - linux
      goarch:
        - amd64
        - arm64
      binary: backup-restore-operator
      ldflags:
        - -extldflags
        - -static
        - -s
        - -X github.com/rancher/backup-restore-operator/pkg/version.Version={{.Version}}
        - -X github.com/rancher/backup-restore-operator/pkg/version.GitCommit={{.Commit}}
        - -X github.com/rancher/backup-restore-operator/pkg/version.Date={{.Date}}
      flags:
        - -trimpath
      env:
        - CGO_ENABLED=0

    - id: bro-tool
      main: ./cmd/tool/main.go
      goos:
        - linux
        - darwin
        - windows
      binary: bro-tool
      ldflags:
        - -s
        - -X github.com/rancher/backup-restore-operator/pkg/version.Version={{.Version}}
        - -X github.com/rancher/backup-restore-operator/pkg/version.GitCommit={{.Commit}}
        - -X github.com/rancher/backup-restore-operator/pkg/version.Date={{.Date}}
      flags:
        - -trimpath
      env:
        - CGO_ENABLED=0

archives:
    - id: backup-restore-operator
      builds:
        - backup-restore-operator
      name_template: '{{ .Binary }}_{{ .Arch }}'
release:
  prerelease: auto
  draft: true
  extra_files:
    - glob : ./build/artifacts/*.tgz
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
