suite: ServiceAccount
templates:
  - serviceaccount.yaml
tests:
  - it: should create service account
    template: serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
  - it: should set name
    template: serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.name
          value: rancher-backup
  - it: should not set annotations by default
    template: serviceaccount.yaml
    asserts:
      - isNull:
          path: metadata.annotations
  - it: should set custom annotations
    set:
      serviceAccount.annotations:
        test: hull-test
    template: serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.annotations.test
          value: hull-test
