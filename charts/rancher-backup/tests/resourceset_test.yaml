suite: ResourceSet optional kubewarden resources
tests:
  - it: basic ResourceSet should not include kubewarden selectors by default
    template: rancher-resourceset-basic.yaml
    asserts:
      - notContains:
          path: resourceSelectors
          any: true
          content:
            resourceNameRegexp: "^cattle-kubewarden-|^kubewarden"
  - it: basic ResourceSet should include kubewarden selectors when enabled
    set:
      optionalResources.kubewarden.enabled: true
    template: rancher-resourceset-basic.yaml
    asserts:
      - contains:
          path: resourceSelectors
          any: true
          content:
            resourceNameRegexp: "^cattle-kubewarden-|^kubewarden"
  - it: full ResourceSet should not include kubewarden secret selectors by default
    template: rancher-resourceset-full.yaml
    asserts:
      - notContains:
          path: resourceSelectors
          any: true
          content:
            kindsRegexp: "^secrets$"
            namespaceRegexp: "^cattle-kubewarden-|^kubewarden"
  - it: full ResourceSet should include kubewarden secret selectors when enabled
    set:
      optionalResources.kubewarden.enabled: true
    template: rancher-resourceset-full.yaml
    asserts:
      - contains:
          path: resourceSelectors
          any: true
          content:
            kindsRegexp: "^secrets$"
            namespaceRegexp: "^cattle-kubewarden-|^kubewarden"
