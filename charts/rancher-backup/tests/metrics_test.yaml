suite: Monitoring Metrics
templates:
  - deployment.yaml
  - s3-secret.yaml
  - pvc.yaml
  - _helpers.tpl
tests:
  - it: should not set METRICS_SERVER env var by default
    template: deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_SERVER
          any: true
  - it: should set METRICS_SERVER env var when metrics enabled
    set:
      monitoring.metrics.enabled: true
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: METRICS_SERVER
            value: "true"
  - it: should set BACKUP_DURATION_BUCKETS env var when metrics enabled
    set:
      monitoring.metrics.enabled: true
      monitoring.metrics.rancherBackupDurationBuckets: "1.5,5,12.5"
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BACKUP_DURATION_BUCKETS
            value: "1.5,5,12.5"
  - it: should set prometheus scrape annotations when metrics enabled
    set:
      monitoring.metrics.enabled: true
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "metrics"
